<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/images/logo mf fav icon 2 .png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindFlow - Automação Inteligente</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS v4 (Browser execution for easy export/testing) -->
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

  <!-- Custom Tailwind Config & Utilities -->
  <style type="text/tailwindcss">
    @theme {
        --font-sans: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        --font-outfit: "Outfit", ui-sans-serif, system-ui, sans-serif;
    }

    @layer utilities {
        .animate-glow-outer {
            animation: pulse-glow-outer 6s ease-in-out infinite alternate;
        }

        .animate-glow-inner {
            animation: pulse-glow-inner 5s ease-in-out infinite alternate-reverse;
        }

        @keyframes pulse-glow-outer {
            0% { opacity: 0.8; transform: translateX(-50%) scale(1); }
            100% { opacity: 0.4; transform: translateX(-50%) scale(1.1); }
        }

        @keyframes pulse-glow-inner {
            0% { opacity: 1; transform: translateX(-50%) scale(1); }
            100% { opacity: 0.6; transform: translateX(-50%) scale(1.05); }
        }

        @keyframes nexus-right {
            0%, 100% {
                transform: skewX(-45deg) translateX(0vw) scale(1);
                background-position: 0% 50%;
                opacity: 0.8;
            }
            50% {
                transform: skewX(-45deg) translateX(-15vw) scale(1.05);
                background-position: 100% 50%;
                opacity: 1;
            }
        }

        @keyframes nexus-mid {
            0%, 100% {
                transform: skewX(-45deg) translateX(0vw) scale(1);
                background-position: 50% 0%;
                box-shadow: 30px 0 60px rgba(0, 0, 0, 0.9);
            }
            50% {
                transform: skewX(-45deg) translateX(10vw) scale(1.1);
                background-position: 50% 100%;
                box-shadow: 50px 0 100px rgba(0, 68, 255, 0.4);
            }
        }

        @keyframes nexus-left {
            0%, 100% {
                transform: skewX(-45deg) translateX(0vw) scale(1);
                background-position: 0% 0%;
                box-shadow: 30px 0 60px rgba(0, 0, 0, 0.9), 10px 0 20px rgba(0, 0, 0, 0.5);
            }
            50% {
                transform: skewX(-45deg) translateX(-8vw) scale(1.05);
                background-position: 100% 100%;
                box-shadow: 60px 0 120px rgba(0, 0, 0, 0.9), 25px 0 50px rgba(0, 255, 255, 0.4);
            }
        }

        @keyframes particle-drift-1 {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.1; }
            50% { transform: translate(-30px, 40px) scale(1.2); opacity: 0.3; }
        }

        @keyframes particle-drift-2 {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.1; }
            50% { transform: translate(40px, -20px) scale(1.2); opacity: 0.3; }
        }

        @keyframes particle-drift-3 {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.1; }
            50% { transform: translate(20px, 30px) scale(1.2); opacity: 0.3; }
        }
    }
  </style>
  <style>
    @keyframes loading-bar {
      0% { left: -50%; }
      100% { left: 100%; }
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
    }
  </style>
</head>

<body class="bg-black text-white font-sans antialiased relative min-h-screen overflow-x-hidden flex flex-col">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
